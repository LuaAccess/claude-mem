name: Deploy Install Scripts

on:
  push:
    branches: [main]
    paths:
      - 'openclaw/install.sh'
      - 'install/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Copy install scripts to deploy directory
        run: |
          mkdir -p install/public
          cp openclaw/install.sh install/public/openclaw.sh

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@a45a0824993483c3fef4d1a2703c0c25c4b567f9  # v25.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./install
